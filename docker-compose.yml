services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchdeck}
      POSTGRES_DB: ${POSTGRES_DB:-pitchdeck}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchdeck} -d ${POSTGRES_DB:-pitchdeck}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pd_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pd_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  miniodata:
