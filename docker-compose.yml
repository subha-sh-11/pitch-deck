services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchdeck}
      POSTGRES_DB: ${POSTGRES_DB:-pitchdeck}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchdeck} -d ${POSTGRES_DB:-pitchdeck}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pd_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Default S3 endpoint (see backend/.env → S3_ENDPOINT=http://localhost:4566).
  # Serves S3 only; no Docker socket is mounted, so it can't touch the host daemon.
  floci:
    image: localstack/localstack:3
    container_name: pd_floci
    environment:
      SERVICES: s3
      DEBUG: "0"
      # Creds are fixed to test/test for local dev (matches backend/.env).
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"   # S3 API (AWS-compatible)
    volumes:
      - flocidata:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Alternative S3 (not needed if you use floci — don't run both). Enable with:
  #   docker compose up -d minio
  minio:
    image: minio/minio:latest
    container_name: pd_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  flocidata:
  miniodata:
