# Pitch Deck — reverse proxy: path routing, SSE/WS streaming, large uploads, rate limiting.
# Dev-oriented config (HTTP). TLS/Let's Encrypt is layered on in production.

upstream nextjs  { server frontend:3000; }
upstream fastapi { server backend:8000; }

# Rate-limit expensive AI endpoints (per client IP)
limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;          # large script uploads (PDF/DOCX/FDX)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # SSE / WebSocket streams (intake chat, generation progress) — must NOT be buffered
    location /api/v1/intake/ {
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_set_header Upgrade $http_upgrade;
        proxy_buffering off;            # critical for streaming
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API → FastAPI (rate-limited)
    location /api/ {
        limit_req zone=ai burst=20 nodelay;
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;       # Next.js HMR websocket in dev
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
