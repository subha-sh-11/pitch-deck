<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 840" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="ic-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#140a08"/>
      <stop offset="0.55" stop-color="#0a0605"/>
      <stop offset="1" stop-color="#050303"/>
    </linearGradient>
    <radialGradient id="ic-glow" cx="0.68" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#7c1f10" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#4a1108" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4a1108" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ic-fig" cx="0.62" cy="0.34" r="0.8">
      <stop offset="0" stop-color="#2a1712"/>
      <stop offset="0.5" stop-color="#120a08"/>
      <stop offset="1" stop-color="#050303"/>
    </radialGradient>
    <linearGradient id="ic-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.45" stop-color="#050303" stop-opacity="0"/>
      <stop offset="0.78" stop-color="#050303" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#050303"/>
    </linearGradient>
    <filter id="ic-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <filter id="ic-soft"><feGaussianBlur stdDeviation="7"/></filter>
