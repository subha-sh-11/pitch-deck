    <path d="M232,300 C224,340 230,378 250,404" fill="none" stroke="#c8503a" stroke-opacity="0.5" stroke-width="3" filter="url(#ic-soft)"/>
    <path d="M235,250 C222,300 226,372 258,420 C230,392 214,338 224,286 Z" fill="#e0603f" fill-opacity="0.28" filter="url(#ic-soft)"/>
  </g>
