<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 840" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="ss-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#100807"/>
      <stop offset="1" stop-color="#040302"/>
    </linearGradient>
    <radialGradient id="ss-glow" cx="0.4" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#8f1f10" stop-opacity="0.7"/>
      <stop offset="0.45" stop-color="#4d0f07" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#4d0f07" stop-opacity="0"/>
