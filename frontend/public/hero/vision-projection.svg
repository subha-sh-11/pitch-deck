<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 840" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="vp-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0908"/>
      <stop offset="1" stop-color="#040303"/>
    </linearGradient>
    <radialGradient id="vp-glow" cx="0.5" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#b83a1c" stop-opacity="0.8"/>
      <stop offset="0.35" stop-color="#6d1c0d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6d1c0d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vp-beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#f2c9a0" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#d98a4a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#d98a4a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vp-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.4" stop-color="#040303" stop-opacity="0"/>
      <stop offset="0.76" stop-color="#040303" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#040303"/>
    </linearGradient>
    <filter id="vp-grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <filter id="vp-soft"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>
  <rect width="600" height="840" fill="url(#vp-base)"/>
  <ellipse cx="300" cy="150" rx="360" ry="300" fill="url(#vp-glow)"/>
  <path d="M300,60 L470,840 L130,840 Z" fill="url(#vp-beam)" filter="url(#vp-soft)"/>
  <path d="M300,90 L400,840 L200,840 Z" fill="#f2c9a0" fill-opacity="0.12" filter="url(#vp-soft)"/>
  <g fill="#050303">
    <path d="M250,840 C252,700 268,610 300,610 C332,610 348,700 350,840 Z"/>
    <rect x="286" y="520" width="28" height="110" rx="14"/>
    <ellipse cx="300" cy="486" rx="34" ry="40"/>
  </g>
  <path d="M283,452 C276,470 277,500 292,524" fill="none" stroke="#f2c9a0" stroke-opacity="0.35" stroke-width="3" filter="url(#vp-soft)"/>
  <rect width="600" height="840" filter="url(#vp-grain)" opacity="0.5"/>
  <rect width="600" height="840" fill="url(#vp-fade)"/>
</svg>
