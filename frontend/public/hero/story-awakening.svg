    <path d="M240,310 C232,356 242,404 274,442" fill="none" stroke="#e06438" stroke-opacity="0.5" stroke-width="4" filter="url(#sa-soft)"/>
    <path d="M300,236 C280,300 286,378 322,436 C286,398 262,332 274,268 Z" fill="#e8703c" fill-opacity="0.22" filter="url(#sa-soft)"/>
