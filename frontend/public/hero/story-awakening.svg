<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 840" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="sa-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#160a09"/>
      <stop offset="0.6" stop-color="#0a0605"/>
      <stop offset="1" stop-color="#050303"/>
    </linearGradient>
    <radialGradient id="sa-glow" cx="0.44" cy="0.2" r="0.72">
      <stop offset="0" stop-color="#a5301a" stop-opacity="0.8"/>
      <stop offset="0.4" stop-color="#5c150b" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5c150b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sa-fig" cx="0.5" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#281410"/>
      <stop offset="0.5" stop-color="#110a08"/>
      <stop offset="1" stop-color="#050303"/>
    </radialGradient>
    <linearGradient id="sa-fade" x1="0" y1="0" x2="0" y2="1">
