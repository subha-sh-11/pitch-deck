version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pd_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchdeck_prod_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-pitchdeck}
    ports:
      - "5432:5432"
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitchdeck} -d ${POSTGRES_DB:-pitchdeck}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pd_prod_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - prod_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pd_prod_backend
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pitchdeck}:${POSTGRES_PASSWORD:-pitchdeck_prod_secure_password}@postgres:5432/${POSTGRES_DB:-pitchdeck}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-pitchdeck}:${POSTGRES_PASSWORD:-pitchdeck_prod_secure_password}@postgres:5432/${POSTGRES_DB:-pitchdeck}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_EAGER=False
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
      - S3_REGION=${S3_REGION}
      - S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-auto}
      - S3_BUCKET_EXISTS=${S3_BUCKET_EXISTS:-True}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-fal}
      - FAL_KEY=${FAL_KEY}
      - FAL_IMAGE_MODEL=${FAL_IMAGE_MODEL:-fal-ai/flux/schnell}
      - MAX_DECK_IMAGES=${MAX_DECK_IMAGES:-48}
      - BUILD_WITH_IMAGES=${BUILD_WITH_IMAGES:-True}
      - ENABLE_OCR=${ENABLE_OCR:-True}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pd_prod_celery
    restart: always
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pitchdeck}:${POSTGRES_PASSWORD:-pitchdeck_prod_secure_password}@postgres:5432/${POSTGRES_DB:-pitchdeck}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-pitchdeck}:${POSTGRES_PASSWORD:-pitchdeck_prod_secure_password}@postgres:5432/${POSTGRES_DB:-pitchdeck}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_EAGER=False
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
      - S3_REGION=${S3_REGION}
      - S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-auto}
      - S3_BUCKET_EXISTS=${S3_BUCKET_EXISTS:-True}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - LLM_MODEL=${LLM_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-fal}
      - FAL_KEY=${FAL_KEY}
      - FAL_IMAGE_MODEL=${FAL_IMAGE_MODEL:-fal-ai/flux/schnell}
      - MAX_DECK_IMAGES=${MAX_DECK_IMAGES:-48}
      - BUILD_WITH_IMAGES=${BUILD_WITH_IMAGES:-True}
      - ENABLE_OCR=${ENABLE_OCR:-True}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pd_prod_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: pd_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  prod_pgdata:
  prod_redisdata:
